<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Chat History</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='history.css') }}">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="history-container">

    <!-- Header -->

    <div class="history-header">

        <button class="back-btn" onclick="window.location.href='/'">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <h2>
            <i class="fa-solid fa-clock-rotate-left"></i>
            Chat History
        </h2>

        <button class="clear-btn" onclick="clearAllHistory()">
            <i class="fa-solid fa-trash"></i>
        </button>

    </div>

    <!-- Search -->

    <div class="search-box">

        <input
            type="text"
            id="searchInput"
            placeholder="Search chats..."
            onkeyup="searchHistory()">

    </div>

    <!-- History List -->

    <div id="history-list">

        {% for chat in chats %}

<div class="history-card">

    <div class="question">
        <i class="fa-solid fa-user"></i>
        <strong>You:</strong> {{ chat.user_message }}
    </div>

    <div class="answer" style="margin:12px 0;">
        <i class="fa-solid fa-robot"></i>
        <strong>Bot:</strong> {{ chat.bot_reply }}
    </div>

    <div class="time">
        <i class="fa-solid fa-language"></i>
        {{ chat.language }}
    </div>

    <div class="actions">

        <button class="view-btn"
onclick="viewChat(`{{ chat.user_message }}`, `{{ chat.bot_reply }}`)">
    <i class="fa-solid fa-eye"></i>
    View
</button>

        <button onclick="deleteChat('{{ chat.id }}')">
            <i class="fa-solid fa-trash"></i>
            Delete
        </button>


    </div>

</div>

{% endfor %}

    </div>

</div>

<!-- View Chat Popup -->

<div id="viewPopup" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closePopup()">&times;</span>

        <h2>Chat Details</h2>

        <p><strong>You:</strong></p>
        <p id="popupQuestion"></p>

        <hr>

        <p><strong>Bot:</strong></p>
        <p id="popupAnswer"></p>

    </div>

</div>

<script src="{{ url_for('static', filename='history.js') }}"></script>

<!-- View Chat Modal -->
<div id="chatModal" class="modal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">&times;</span>

        <h2>💬 Chat Details</h2>

        <hr>

        <p><strong>You:</strong></p>
        <p id="modalUser"></p>

        <br>

        <p><strong>Bot:</strong></p>
        <p id="modalBot"></p>

        <br>

        <p><strong>Language:</strong>
            <span id="modalLang"></span>
        </p>

    </div>

</div>

</body>

</html>
